<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato/Reserva</title>
</head>
<body>
    <a href="index.html">Voltar</a>
    
</body>
<main>
    <section>
        <h1>Contato</h1>
        <form>
            <div>
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Ex:Felipe" required>
            </div>
            <div>
                <label for="E-mail">E-mail</label>
                <input type="text" id="E-mail" placeholder="joaocleber@gmail.com" required>
            </div>
            <div>
                <label for="Destino de interesse">Destino de interesse</label>
                <input type="text" id="destino" placeholder="Ex: Rio de janeiro" required>
            <div>
                <label for="Data">Data</label>
                <input type="number" id="Data" placeholder="Ex: 11/09/2026" required>
            </div>
            <div>
                <label for="Quantidade de Pessoas">Quantidade de Pessoas</label>
                <input type="number"  id="Quantidade" placeholder="Ex:7" required>
            </div>
            <div>
                <label for="Mensagem">Mensagem</label>
                <input type="text" id="Mensagem">
            </div>
            <div>
                <button type="submit">Botão de envio</button>
            </div>
                
            
        </form>
    </section>
</main>
</html>
