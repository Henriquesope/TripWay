<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato/Reserva</title>
</head>
<body>
    <nav>
        <a href="/index.html">TripWay</a>
        <ul>
            <li><a href="/pages/servicos.html">Serviços</a></li>
            <li><a href="/pages/destinos.html">Destinos</a></li>
            <li><a href="/pages/contato.html">Contato</a></li>
       </ul>
    </nav>

    <a href="/index.html">Voltar</a>
    
</body>
<main>
    <section>
        <h1>Contato</h1>
        <form>
            <div>
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Ex:Felipe" required>
            </div>
            <div>
                <label for="E-mail">E-mail</label>
                <input type="email" id="E-mail" placeholder="joaocleber@gmail.com" required>
            </div>
            <div>
                <label for="Destino de interesse">Destino de interesse</label>
                <select name="estados" id="Destino de interesse" required>
                    <option value="" disabled selected>Escolha um lugar...</option>
                    <option value="salvador">Salvador</option>
                    <option value="rio-de-janeiro">Rio de Janeiro</option>
                    <option value="sao-paulo">São Paulo</option>
                </select>
            <div>
                <label for="Data">Data</label>
                <input type="date" id="Data" placeholder="Ex: 11/09/2026" required>
            </div>
            <div>
                <label for="Quantidade de Pessoas">Quantidade de Pessoas</label>
                <input type="number"  id="Quantidade de Pessoas" placeholder="Ex:7" required>
            </div>
            <div>
                <label for="Mensagem">Mensagem</label>
                <input type="text" id="Mensagem">
            </div>
            <div>
                <button type="submit">Botão de envio</button>
            </div>
                
            
        </form>
    </section>
</main>
</html>
